<svg xmlns="http://www.w3.org/2000/svg" width="495" height="180" viewBox="0 0 495 180">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bd5eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: url(#glow); opacity: 1; }
        50% { opacity: 0.85; }
      }
      @keyframes borderFlow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -40; }
      }
      @keyframes barGrow {
        from { width: 0; }
      }
      .title { animation: glowPulse 3s ease-in-out infinite; }
      .lang-row { opacity: 0; animation: fadeIn 0.5s ease forwards; }
      .lang-row:nth-child(1) { animation-delay: 0.2s; }
      .lang-row:nth-child(2) { animation-delay: 0.35s; }
      .lang-row:nth-child(3) { animation-delay: 0.5s; }
      .lang-row:nth-child(4) { animation-delay: 0.65s; }
      .lang-row:nth-child(5) { animation-delay: 0.8s; }
      .border-anim { animation: borderFlow 2s linear infinite; }
      .bar-ts { animation: barGrow 1s ease forwards 0.3s; }
      .bar-rs { animation: barGrow 1s ease forwards 0.45s; }
      .bar-py { animation: barGrow 1s ease forwards 0.6s; }
      .bar-js { animation: barGrow 1s ease forwards 0.75s; }
      .bar-ot { animation: barGrow 1s ease forwards 0.9s; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="495" height="180" rx="10" ry="10" fill="#0d1117" />

  <!-- Animated gradient border -->
  <rect x="1" y="1" width="493" height="178" rx="10" ry="10"
        fill="none" stroke="url(#border-grad)" stroke-width="2"
        stroke-dasharray="10 5" class="border-anim" />

  <!-- Inner subtle border -->
  <rect x="3" y="3" width="489" height="174" rx="8" ry="8"
        fill="none" stroke="#21262d" stroke-width="1" />

  <!-- Title -->
  <text x="25" y="33" class="title"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="700" fill="#00d4ff" filter="url(#glow)">
    Most Used Languages
  </text>

  <!-- Language rows -->
  <g transform="translate(25, 48)">

    <!-- TypeScript -->
    <g class="lang-row" transform="translate(0, 12)">
      <circle cx="6" cy="-3" r="5" fill="#00d4ff" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">TypeScript</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">42.3%</text>
      <rect x="110" y="-9" width="280" height="10" rx="5" fill="#21262d" />
      <rect x="110" y="-9" width="118.4" height="10" rx="5" fill="#00d4ff" class="bar-ts" opacity="0.9" />
    </g>

    <!-- Rust -->
    <g class="lang-row" transform="translate(0, 36)">
      <circle cx="6" cy="-3" r="5" fill="#f0783c" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Rust</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">23.1%</text>
      <rect x="110" y="-9" width="280" height="10" rx="5" fill="#21262d" />
      <rect x="110" y="-9" width="64.7" height="10" rx="5" fill="#f0783c" class="bar-rs" opacity="0.9" />
    </g>

    <!-- Python -->
    <g class="lang-row" transform="translate(0, 60)">
      <circle cx="6" cy="-3" r="5" fill="#3572a5" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Python</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">18.7%</text>
      <rect x="110" y="-9" width="280" height="10" rx="5" fill="#21262d" />
      <rect x="110" y="-9" width="52.4" height="10" rx="5" fill="#3572a5" class="bar-py" opacity="0.9" />
    </g>

    <!-- JavaScript -->
    <g class="lang-row" transform="translate(0, 84)">
      <circle cx="6" cy="-3" r="5" fill="#f1e05a" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">JavaScript</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">10.4%</text>
      <rect x="110" y="-9" width="280" height="10" rx="5" fill="#21262d" />
      <rect x="110" y="-9" width="29.1" height="10" rx="5" fill="#f1e05a" class="bar-js" opacity="0.9" />
    </g>

    <!-- Others -->
    <g class="lang-row" transform="translate(0, 108)">
      <circle cx="6" cy="-3" r="5" fill="#6e7681" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Others</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">5.5%</text>
      <rect x="110" y="-9" width="280" height="10" rx="5" fill="#21262d" />
      <rect x="110" y="-9" width="15.4" height="10" rx="5" fill="#6e7681" class="bar-ot" opacity="0.9" />
    </g>

  </g>
</svg>