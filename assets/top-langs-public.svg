<svg xmlns="http://www.w3.org/2000/svg" width="495" height="180" viewBox="0 0 495 180">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bd5eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      @keyframes glowPulse {
        0%, 100% { filter: url(#glow); opacity: 1; }
        50% { opacity: 0.85; }
      }
      @keyframes borderFlow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -40; }
      }
      .title { animation: glowPulse 3s ease-in-out infinite; }
      .border-anim { animation: borderFlow 2s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="495" height="180" rx="10" ry="10" fill="#0d1117" />

  <!-- Animated gradient border -->
  <rect x="1" y="1" width="493" height="178" rx="10" ry="10"
        fill="none" stroke="url(#border-grad)" stroke-width="2"
        stroke-dasharray="10 5" class="border-anim" />

  <!-- Inner subtle border -->
  <rect x="3" y="3" width="489" height="174" rx="8" ry="8"
        fill="none" stroke="#21262d" stroke-width="1" />

  <!-- Title -->
  <text x="25" y="33" class="title"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="700" fill="#00d4ff" filter="url(#glow)">
    Most Used Languages
  </text>

  <!-- Language rows -->
  <g transform="translate(25, 48)">

    <!-- TypeScript -->
    <g class="lang-row" transform="translate(0, 12)">
      <circle cx="6" cy="-3" r="5" fill="#3178c6" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">TypeScript</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">40.1% (60.4MB)</text>
      <rect x="170" y="-9" width="150" height="10" rx="5" fill="#21262d" />
      <rect x="170" y="-9" width="60.2" height="10" rx="5" fill="#3178c6" class="bar-ts" opacity="0.9" />
    </g>

    <!-- Python -->
    <g class="lang-row" transform="translate(0, 36)">
      <circle cx="6" cy="-3" r="5" fill="#3572A5" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Python</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">35.9% (53.9MB)</text>
      <rect x="170" y="-9" width="150" height="10" rx="5" fill="#21262d" />
      <rect x="170" y="-9" width="53.9" height="10" rx="5" fill="#3572A5" class="bar-rs" opacity="0.9" />
    </g>

    <!-- C++ -->
    <g class="lang-row" transform="translate(0, 60)">
      <circle cx="6" cy="-3" r="5" fill="#f34b7d" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">C++</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">9% (13.5MB)</text>
      <rect x="170" y="-9" width="150" height="10" rx="5" fill="#21262d" />
      <rect x="170" y="-9" width="13.5" height="10" rx="5" fill="#f34b7d" class="bar-py" opacity="0.9" />
    </g>

    <!-- Rust -->
    <g class="lang-row" transform="translate(0, 84)">
      <circle cx="6" cy="-3" r="5" fill="#dea584" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Rust</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">3.5% (5.2MB)</text>
      <rect x="170" y="-9" width="150" height="10" rx="5" fill="#21262d" />
      <rect x="170" y="-9" width="5.3" height="10" rx="5" fill="#dea584" class="bar-js" opacity="0.9" />
    </g>

    <!-- Kotlin -->
    <g class="lang-row" transform="translate(0, 108)">
      <circle cx="6" cy="-3" r="5" fill="#A97BFF" />
      <text x="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" fill="#c9d1d9">Kotlin</text>
      <text x="435" text-anchor="end"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
            font-size="12" font-weight="600" fill="#8b949e">2.5% (3.8MB)</text>
      <rect x="170" y="-9" width="150" height="10" rx="5" fill="#21262d" />
      <rect x="170" y="-9" width="3.8" height="10" rx="5" fill="#A97BFF" class="bar-ot" opacity="0.9" />
    </g>

  </g>
</svg>