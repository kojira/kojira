name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright gif-encoder-2 sharp

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Fetch stats and update SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          node scripts/fetch-stats.mjs > /tmp/stats.json
          node scripts/update-svgs.mjs /tmp/stats.json

      - name: Render animated GIFs
        run: |
          node scripts/render-gif.mjs assets/stats.svg assets/stats.gif
          node scripts/render-gif.mjs assets/top-langs.svg assets/top-langs.gif

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update GitHub stats $(date -u +%Y-%m-%d)"
          git push
